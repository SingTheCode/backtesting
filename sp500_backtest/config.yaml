# 데이터 수집 설정
data:
  symbol: "^GSPC"
  period: "3y"

# 조합 설정
combination:
  max_confirmations: 3
  max_combinations: 100000

# 백테스팅 설정
backtest:
  transaction_cost: 0.001
  signal_expiry: 3
  alternate_signal: true

# 파라미터 최적화 설정
optimizer:
  method: "grid"
  random_iterations: 1000

# 결과 설정
results:
  sort_by: "total_return"
  top_n_display: 20
  top_n_report: 5

# 성능 설정
performance:
  n_workers: -1
  checkpoint_interval: 100

# 파라미터 탐색 범위 (지표별)
param_ranges:
  ema_cross:
    fast_period: { min: 5, max: 50, step: 5 }
    slow_period: { min: 20, max: 200, step: 10 }
  supertrend:
    atr_period: { min: 5, max: 30, step: 5 }
    factor: { min: 1.0, max: 5.0, step: 0.5 }
  rsi:
    length: { min: 7, max: 21, step: 2 }
